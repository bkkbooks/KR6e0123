body:
  text: 河朔平原道通述五兜率天宮會二十三升兜率天宮品一遍一切經中有百萬億莊嚴皆是回向心廣大所致也建百萬億幢懸百萬億幡垂百萬億帶然百萬億香布百萬億鬘持百萬億扇執百萬億拂有百萬億三賢菩薩二十八天八部衆等皆從回向起俱來圍繞佛放膝輪光遍照十方界十幢菩薩俱來雲集一切寶莊嚴殿二十四兜率天宮偈讚品意曰諸法無自性即見般若體二十五十回向品悲心救護苦衆生意曰妄亡已滅則與萬類而同回向三處一真如實際是所證二無上菩提是所求三法界含識是所度能回之心所回善行經中金剛幢入智光三昧受加與智起定説法一救護衆生相十波羅蜜慈悲雖救衆生離衆生相二不壞回向一切處得不壞信積善根回向衆生三等一切佛回向以世出世樂回向衆生令入佛慧四至一切處回向所修一毫之善同於實際供養五無盡功德回向眼不見不淨世界不見異相衆生六堅固一切善根為大國王以內外財六十門施七順衆生回向小善廣善盡未來際回向一切衆生八真如相回向真如有一百門正念明了生勝善根九無著無縛回向於一切善根心生尊重修普賢行十等法界回向廣行法施圓滿梵行見聞等於法界説此回向已各百萬億佛剎微塵世界六種震動六他化自在天宮會二十六十地品寄相顯實意曰地體亡言將旨就詮寄十地修行相顯不可思議地體一念事行三心齊具可為玄矣十地菩薩雲集摩尼寶藏殿將三賢作加行無升天偈贊用等覺為勝進經中金剛藏菩薩入大智慧光明三昧者欲説不思議諸佛法光明即十地法相天親菩薩造十地論解十地經云若金剛即藏名堅量云十地信悲慈捨有法不可破壞宗堅實生長故因由如樹心若金剛之藏名堅量云十地善行有法不可破壞宗堅實生長故因由如胎孕在藏意曰經中説字是名句文因十地名句而起正解因解而起正行因行而入地智天親論主創造六相義令入智地為總相餘九為別相乃云攬別為總分總為別同帶總名功用各異共成一緣各住自位諸法常寂滅壞也世界常安立成也正同常異正總常別無礙之義則可見矣經中十方諸佛與智增辨摩頂增威從三昧起告諸菩薩言大願決定大善決定無雜決定不可見決定廣大決定究竟決定十地相也若智光明是最上道隨證智也意曰十地帶數釋也若地之極喜喜是加行智若地即極喜是根本智若極喜之地後得智若極喜即地泯同真界餘九地各有四釋準知良由一切衆生本有智光明地法則金剛藏分別説也於智光明中説十地名已不復分別一解脫怪默騰疑請法深難受止二解脫月歎衆生聞請不堪有損止三解脫月如來護念請字母智根本四大衆同聲請五佛光説偈請金剛藏云此處難宣示我今説少分論中科為九分一三昧分入定二加分與智三起分事訖四本分略名五請分勤重六説分示相七地影像分四河十山大海寶珠八利益分見聞為種九重頌分意曰十地中名句文有法字字契如宗難説難示故因如空中鳥迹謂空處之迹迹處之空互相屬著不相離性以為地體取空太寬取迹太狹言言見諦是智行非慮境也十地通行十行一信二悲三慈四捨五知諸經論六善解世法七慚愧八莊嚴九供養諸佛十如説修行一極喜地斷異生性障證遍行真如於住地心中發起供養諸佛等十種大願見諸衆生心墮邪見慈心修捨於內外財無所吝惜推求後地相及得果如鍊真金數數入火多作閻浮提王能動百佛世界二離垢地十種方便心入心中斷邪行障證最勝真如於住心中修起十種善業一性不殺生二不偷盜三不邪淫四不妄語五不兩舌六不惡口七不綺語八不慳吝九不瞋恚十不謗三寶十善無二用心不同一下三品修四大洲受生有總別報勝劣苦樂間起二中三品修從四王至他化欲心微薄苦少樂多三上三品修色界至有頂捨念清淨無有欲想四上上品修斷分別是預流果斷俱生後三果五上勝品修緣覺果百劫鍊根入見不出證無學果六上極品修菩薩道前伏二障俱生修道漸斷七不善業道故意殺生等永斷其因因有三品上品地獄因中品畜生因下品餓鬼因後得為人有二種報等流一者為短命二者多病故意偷盜一者貧窮二者共財不得用故意邪淫一妻不貞良二者不得隨意眷屬故意妄語一者為他所誑二者被人誹謗故意兩舌一者眷屬乖離二者親族弊惡故意綺語一者語不明了二者言無人受故意惡口一者言多爭訟二者常聞惡聲故意慳吝一者心不知足二者多欲無厭故意嗔怒一者為他所害二者求其長短故意誹謗一者生邪見家二者心懷諂曲永斷其因不受其果三發光地起十種深心為加行於入心中斷暗鈍障證勝流真如於住心中如説修行乃得佛法雖修世行但隨順法故行而無樂著修起四禪八地定厭下地為苦粗障欣上地為淨妙利用七種作意四無間道伏下欲界九品俱生惑迷事用初禪未至定為加行入初禪根本定四禪共有十八禪支初禪三禪有五支二禪四禪有四支其定光明如鍊金法出火稱兩不減此地多作忉利天王三界九地者一五趣雜居地有四洲六欲天五受間起憂苦極多喜樂捨少嗔欲心俱意有憂受俱無輕安樂報若修則有故名散地二離生喜樂地三天一大梵二梵輔三梵衆用尋伺治欲界憂受有五尋伺喜樂一心三喜勇浮動地三一光二少光三無量光用內淨一心治去尋伺有四內淨喜樂一心四離喜妙樂地三一淨二少淨三遍淨治前喜受開內淨為捨念正知識身受樂一心五捨念清淨地三一無雲二福生三廣果凡聖雜居上有五天唯不還果人居一無煩二無熱三善現四善見五色究竟捨念行捨一心六空無邊地二乘及邪見人居空想治色想唯有捨受一心七識無邊地作無邊想治於空唯有捨受及一心八無所有地四蘊與識皆盡治之捨受一心九非非想地無粗有細八萬劫報盡還來捨受一心四焰慧地觀察衆生界法界為加行心於入心中斷煩惱障證無攝受真如住心中以大智慧觀三十七品助道法佛於雙林樹間入般涅槃者四枯四榮皆除世間貪憂八倒俱無若能觀身淨與不淨俱不可得即見佛不曾入般涅槃常住世間深觀念處即座道場衆生根異更説餘法於四正勤四神足五根五力七覺八聖一一開解衆生於第六識中俱生二見到此地中永不現行更以大慈心知恩報恩如真金作莊嚴具多作須夜摩天王五難勝地起十種平等心為加行於入心中斷下乘般涅槃障證類無別真如知真諦俗諦無差別智愍諸衆生不能厭離曲以五明工巧利益世間一內明知因識果二因明破邪立正三醫方療病四工巧書數五聲明字錯謬如上妙真金用硨磲磨瑩作知足天王六現前地觀十種平等法而為加行心於入心中斷粗相現行障證無染淨真如於住心中以大悲為首大悲增上大悲滿足觀三界十二因緣無有自性從無明支至老死支皆是智光明則身語意善不善行動用之中皆是般若現前也經中金剛藏如星羅十門説十二支天親論主以月滿三觀釋之若依地論相諦差別觀中有支相續門解經成答相世間受生皆由著我者成也不正思惟起於妄行答也於第一義諦不了名無明相也二一心所攝門三界所有唯是一心歸本也如來於此一心分別十二有支流末也若依一切智相觀科經不同一切種智觀科經不同文勢多端不可具述意曰能引無明行所引識等五能生愛取有所生生老死識名色六處觸受種子是前前世中多念薰下忽然為無明行一念招聚隨業強者先潤愛取有潤時則次第於一生總報中生起此十支因二支果也若三世説者過去二支因現在五支果現在造愛取有因本來世有生老死果雖然因果無差於此般若現前名色支義也貫起十二支收一百法知五蘊之多少明緣性之寬狹一支性俱雜收九十三法色蘊為色支四蘊為名除六無為滅盡定二支雜性不雜收二十八法支雜性處觸受然是無記不雜善惡性想全三少分者想是任運報生無記色少分者五根五塵行少分者別境五作意睡眠識少分者前七識并意處觸受三支性俱不雜收二十法想蘊全色少分五塵行少分收別境五作意睡眠識少分前七識餘十一支義理恐繁不述此地善根如真金用毗琉璃寶磨瑩多作善化天王七遠行地起十種加行心空中有方便慧有中起殊勝行雖善修空無相無願而慈悲不捨度生於入心中斷微細現行障證法無別真如於住心中以大悲智修起一切菩提分法雖念念住無相中少有功用如轉輪王遊四天下若是八地報得行任運成就如大梵天王遊千世界不假功用從初地已來但以願力超過小乘今七地中以自力超過小乘如王太子藝業成就能念念入滅定亦念念起如以真金用妙寶間錯多作自在天王八不動地善修清淨道離心意識得無生法忍為加行心於住心中斷無相中作加行障證不增減真如相用煩惱不能動為深行菩薩世出世間心念不生諸佛世尊勸請七事汝未曾得勿復放捨於此心門是時菩薩一念所生智業從初地至七地用阿僧祇功德不及一分何以故先以一身起行修行今此以無量身修行以善巧智觀一切境於諸趣中示同其形普現色身三昧而為説法遠離身想分別以三世間而為十身一切衆生本來共有一身若具九則十身有百也且如一牛具有十身一還債是業報身二水草不闕是衆生身三皮毛筋角是國土身四從高而下是虗空身五步步踏實是智身六力困而臥是聲聞身七見黃葉是緣覺身八舉意利他是菩薩身九忽然亡已是法身十一具前九是如來身若説修成如來身上自具十身謂菩提願化力莊嚴威勢意生福法智此地菩薩成就佛身業自在有金剛力士常隨侍衛如真金作大寶冠置在閻浮提聖王頂上多作大梵天王九善慧地以無量智觀察境界為加行心於入心中斷利他門中不欲行障證智自在真如於住心中觀衆生稠林行皆如實知以四十種辨才説三乘法教化衆生意曰在心為智發言為辨於一毛塵具四十種辨才則前為所是法後是能為義詞則訓釋不謬樂説則聽者開解一自相有二總法別義二同相有二性法相義三行相有二現在法過去義四説相有二略説法解義五智相有二現量法比知義六真諦法俗諦義七權三法一乘義八教道法證道義九真身法應身義十住持智法行門義佛説一百法皆具萬像皆具不學而知但聞其言未見人哉此地菩薩得十種總持作大法師處於法座於一音中現種種音令諸衆會皆得解了情無情物皆演妙音成就如來語業自在如真金為大寶冠在轉輪聖王頂上為二千世界主十法雲地以無量智慧觀察覺了入受職位為加行心於入心中得離垢三昧斷於法中未得自在障證業自在真如於住地心受勝職位三昧現在前時大蓮華忽然出現量等百億世界菩薩座此華時大小相稱身諸毛孔普放光明照法界已從足下入十方菩薩即知成佛十方諸佛放眉間光入此菩薩頂名曰受職成就佛意業自在具上上微細智能安受攝持十方諸佛大法明大法照於一念頃周遍十方示成正覺解脫言若菩薩神力能如是者佛復云何是時金剛藏菩薩入佛國土體性三昧其身量等虗空時諸大衆見菩提樹及一會菩薩俱在金剛藏身中得未曾有金剛藏言菩薩神通如一塊土如來神通似大地土不可云喻如上妙真金以大寶莊嚴置在大自在天王頂上多作摩醯首羅天王八地影像分地中行成智性是所喻法池山海珠是能喻依依上之義是影像也是地之影像以見邊之喻似地中教證也池喻所修行願山喻修成功德海喻無漏智德珠喻轉盡性德池喻始則非一終則非異山喻能依非一所依非異上皆無差之差海喻十德不同德無別物差即無差珠喻唯一智性前後增明無差不礙差池是圓家漸山是圓中漸珠喻漸圓海喻圓圓天台以華嚴為漸圓位位成佛以法華經為圓圓上是法圓不説地位下機圓普被聲聞華嚴以法華經為漸圓會三乘歸一乘大海華嚴本法因該果海為上圓果徹因源為下圓一願行定悲有法不可破壞宗無滯礙故因如池流四河入海二十行隨地增有法本無勝劣宗差別得名故因如大海十山三十地無漏智有法廣大無邊宗稱性修故因如大海十德四十地智性有法不生不滅宗全真性故因如寶珠十德七重會普光明殿佛自入剎那際三昧者無際之際信心最初之際不見剎那為短多劫為長諸法空故二行永絶住於佛住得佛平等則無障處普眼問者欲見普法故初則聞名不見推求不見觀察不見靜座不見後如來教起見方者若捨境別求則未識普法真體若見一法入於一切名曰普一切入一名曰賢乃真見也二十七十定品大用深廣普眼見普賢在如來前告普眼言有十大三昧一普光明智三昧用依於體二妙光明智三昧遍照身心三往佛國土三昧神通如意四清淨深心三昧供佛之行五過去莊嚴藏三昧智之境六未來藏三昧如實了知七現在莊嚴三昧諸佛世界八三世衆生三昧入出自在九法界三昧十八界十無礙輪三昧佛二十一功德二十八十通品大用難思一他心之智通因中則知自心知他人心皆變影像不如實見唯佛果位能遍知也正見他心常了自心若佛智外別有衆生心則失具分唯識只名半頭唯識他心本質即是自心二天眼之智通見六趣果報三宿住之智通得九世眼如現在四未來之智通見因知果五天耳之智通遠細皆聞六無作即智通大用度生七言音之智通衆生之言音八色身之智通三説一云佛無色二云有色三云若悲智雙運無色現色有四一實色凡夫二幻色初教三性色終教四妙色圓教一色即一切色經中説有一百三種據實無盡九真俗之智通相待故空性則非異相則非不異十滅盡之智通雖見五蘊寂滅常化寂滅之衆生二十九十忍品智慧深玄意曰前二品業用廣大此品智慧深玄忍體即智前三忍法説後七忍喻明一音聲忍智解於教二順忍止觀起行土二加行三無生忍是根本從初地立四如幻忍中喻有為無為法從因緣生皆是所喻喻有五重一巾喻真性二術喻業思三幻相喻報四生滅喻依他即圓成五愚小為有法土五各有二義以成四句一所依性有相無俱存俱奪二業上用有體無俱存俱奪三報上相有實無俱存俱泯四幻報生即是死俱存俱泯五愚小上情有理無俱存泯今令知術是起因悟像果無實成相即是性遣愚小為有歸本來真性量云一切有為無為法有法非實有體宗從因緣生因同喻如幻事五如焰忍一空地喻如來藏二陽氣如無明三空與氣合心上現報四水即是無五凡小為有一切世間有法非實有體言説顯示如陽焰六如夢忍一悟心如本識二眠如無明三夢如緣起法四夢非有似有五令夢者為實一切世間有法非實有體想所現故如夢所見七如響忍一谷喻如來藏二聲如機感三響應佛説法四有而非實五取著為有量云如來音聲有法定非實有宗從緣感顯故因如谷響八如影忍一鏡喻真心二面如思業三影似所起報果四正有常無五當情為有量云業所招果有法定非實有宗從緣似有故因如鏡中現像九如化忍一空喻真性因二悲心化者緣三無而忽有四用有實無五著相為有菩薩變化有法非實能度宗似有度用化迹故因如空中變化事十如空忍此空義不開五法者為與無為雙遣也量云世出世間有法對待不實故宗遠有近無故因如太虗空三十阿僧祇品盡一切數意曰等覺行德難思經有一百二十四數何故唯標僧祇之名答僧祇是十大數之初首壽量品盡一切時豎窮三際住處品遍一切處橫遍十方此品明盡一切數校量等覺菩薩一念智德深玄不究邊際何故心王問答數不離心佛自説者唯佛方知此有三等數如此方黃帝算法是下等數十十倍之二中等數則百百倍之經云一百洛叉為一俱胝三上等數則倍倍倍之經云俱胝箇俱胝為一阿庾多以後用上等數之不可説箇不可説乃至一塵有十萬箇不可説用此數普賢一智德不盡況一塵內有多普賢三十一如來壽量品豎窮三際意曰如來法身豈有壽也答應機而説有十種相將前一劫為後一日一夜至最後壽量等於剎海其實如來在長常短在短常長存泯無礙方為圓宗壽量窮於三際三十二諸菩薩住處品橫遍十方意曰若心有住則為非住據實不遍住一方經説住處使後人標心有歸問應非圓教所明答能住菩薩毛含剎海住處塵容大千何故心王説答心隨智住問智依何住答前十依八方山海後十二城邑雜居無在不在曲盡物機三十三佛不思議法品一念普現意曰是修生三賢十聖因家果也法界體大青蓮華菩薩説者於一念中示現一切佛事體不可思議問經中何故重請答為説果滿何不言請答果海亡言不可思議然教説不同或云佛有四十種不共功德通權小説或説五法攝大覺性通權實説或云一味實德約頓教説或云佛有無盡德是此所明佛德有二一修生信等二者本有智德使八相該於法界丈六遍盡十方豈可思議也
