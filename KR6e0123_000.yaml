front:
  text: 大方廣佛華嚴經吞海集序左朝散大夫直龍圖閣知荊南軍府事主管荊湖北路安撫司公事馬步軍都總管兼營田使陶愷撰大方廣佛華嚴經具因果行位緣起理事以不思議為宗無上乘也以為同也而橫開百千法門其總非同以為異也而會歸實際理地其別非異即同即異義極於融故同中有異鳥翔空而前後齊彰異中有同波生水而泯絶一致萬法各住自位有如水火陵滅而不相容至理不隔纖毫或若塵芥含容而無所礙此非器界之所能通而思議之所可及也然而非文字無以明義非名句無以成文則錯綜而華貫行布而星分此經之所以為經也由文字名句以求之則法法相似地地有差其多也百千萬億以為數乃至不可為數而未脫於有數也其大也十方三際以為量乃至不可為量而未離於有量也經之為經既託於文句其妙不過如是而已舉世間極大不可窮盡者則喻以海焉所謂十海若世界衆生諸佛業報法界根欲法輪願力神變佛化皆生佛之極業同名之海而七處九會三十九品悉波瀾其間無有能出者其源無首其流無尾其邊無旁其下無底則取海以為喻是亦天下之極稱歟至求之天地之間若形若器能體融之義而曲當者蓋亦莫若海也是經也行於支那自晉義熙始其文浩博其義淵微其道宏大志劣者怠於編秩之多智淺者瞢於旨意之妙器狹者駭於果德之極誦其文已難其人而況通其義且踐修是道歟譬猶海中之一物方為海所涵詎能置海於度內耶義熙距今幾千歲訓釋行於今者獨有棗柏長者論清涼法師疏其説益侈矣偃臺通老法師得華嚴三昧雖受學於師而取成其心以廣説之一句而演之萬言以約説之一品而攝以數句萬言而詳味之無一增語數句而旁求之無一缺義計不待數而人見其多度不必量而人識其大法次地差不相混濫蓋發揮在文句之表而遊戲於文句之間卒不繫於文字名句者也取其約説傳於世凡萬數千言名之曰吞海海可吞耶衆必以為誕矣然有可吞之理者能造海者也通公約説亦文句耳奚造海之有余所謂卒不繫於文句者學者繹其書而加思焉當得之矣噫大千經卷一塵所覆唯智者能出之華嚴法海一嚃而不遺餘滴唯知道者能信之或出或納豈外至哉在我𭊌吸之間耳大方廣佛華嚴經吞海集序講華嚴楞嚴經唯識起信論嗣祖比丘道通述伏以華嚴之為教也朝宗衆經清涼之為疏也貫映前古不有穎達孰能發明道通夙附真乘窮居講肆論聽宣益經傳妙空退慚先哲無裨後學請問十年開演三遍屢經患難倍覺衰遲築室廬山苟延歲月而二三學者猶不我棄日以是經相叩華嚴為事因閲舊篋得所編法義名曰吞海用貽晚俊使品品之中見無盡經塵塵之內明華藏海於一毛端忽然廣博豈曰小補之哉不學而知但聞其言未見其人也同心之士母我誚焉
