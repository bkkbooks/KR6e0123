body:
  text: 河朔平原道通述一菩提場會一世主妙嚴品部類區分經中有三世間一智正覺世間主能化佛二有情世間主人王天王三器世間主諸類神若能依正互融則難思之境俱是妙嚴意曰世主差別相妙嚴平等體若世主之妙嚴衆生有佛德若妙嚴之世主佛德依衆生若世主即妙嚴是法平等若妙嚴即世主則世間相常住若具四句則成佛德若泯四句為日用若存泯無礙生佛平等法本如此不勞修證如是一小乘揀異外道經阿優二始教信順之辭三終教不變曰如隨緣曰是四頓教唯如為是五圓教如包是遍我聞一小乘識外有聲二始教識變聲相假我三終教淨我聲塵即心四頓教無我根塵俱盡五圓教一聞一切聞一時一小乘晝夜六時二始教時依識現三終教則不變隨緣四頓教則般若現前五圓教則一時具一切時佛在一小乘丈六真身二始教千百億化身三終教丈六即是常身四頓教丈六即是法身五圓教具足十身菩提樹一小乘土石諸山二始教隨機化迹三終教其地堅固四頓教一塵不立五圓教七處九會同一道場菩薩衆一小乘不見聞二始教有四十二位三終教盡成佛四頓教無凡聖五圓教佛剎微塵數俱來集會經中釋迦如來初成佛時具足本有十身於一切法成正覺意曰始成正覺者舊佛新成也處於此座者開悟之處量等法界如虗空具普遍廣容二義量云如來三業有法正容常遍宗平等無分別故因譬如虗空於諸國土平等隨入一塵為座則成等正覺若一毛為座則轉大法輪塵數菩薩圍繞者主伴互嚴經中列衆從內至外偈讚佛德從大自在天至普賢海衆雲集一同生衆有二十種普賢至普光菩薩海月光至智生菩薩二異生衆十種執金剛神身衆神足行神道場神主城神主地神主山神主林神主藥神主稼神主河神主海神主水神主火神主風神主空神主方神主夜神主晝神阿修羅王迦樓羅王緊那羅王摩睺羅王夜叉王龍王鳩槃茶王乾闥婆王月天子日天子忉利天夜摩天兜率天化樂天他化天大梵天光音天遍淨天廣果天大自在天經中列衆從內至外偈讚佛德從外至內有十佛剎微塵數毗盧遮那佛一一皆有六十衆圍繞形色部類各有區分得佛解脫平等無二二如來現相品說法儀式經中佛放眉間光右繞於佛從足而入有大蓮華忽然出現有勝音菩薩坐蓮華上偈讚如來有十菩薩為伴意曰實際理地主伴不立生滅門中豈無問答菩薩諸王作是思惟從因至果有四十問一部經文前後答為斷彼疑故即於面門衆齒之間放十種光明一切菩薩蒙佛光明詣如來所親近供養三普賢三昧品非證不說經中普賢見佛現相承佛神力入於如來藏身三昧同於虗空一一塵中有世界海諸佛一一佛前有普賢皆入此定是時十方諸佛而現其前與普賢十種說法智各舒右手摩普賢頂一一塵中悉亦如是從一三昧起時即從一切三昧門起得一切海雲法十方世界悉皆震動四世界成就品通明凡聖經中且說世界海有十事其衆生海具十事准知諸佛海等各有起具因緣所依所住等十事各先長行後偈頌一海有十事十海有百事意曰先觀無盡境便說無盡法一切衆生本來具足五華藏世界品別顯本師經中別明本師之所嚴淨狀如仰安鴈口中齒又似倒卓浮圖其中世界各各依住各各形狀各各體性各各莊嚴各各行列有二十重從此中央大蓮華世界外其次右旋說百箇二十重世界十不可說世界種准知盡在一塵毛中矣六毗盧遮那品往昔修因經中修因廣大獲果無窮普賢說者該因徹果故乃往古世有勝音劫摩尼華枝輪大林之東焰光大城人王所都有百億城周匝圍繞有百萬億門一一門前四十九寶尸羅幢城中居人乘空往來心有所欲應念而至天城龍城右旋而列華枝林中有遍照道場一切功德山須彌勝音佛忽然出現其身周普等真法界大威光太子見佛光明獲十種法頌讚佛德從焰光城百萬億衆乘空而往俱來見佛其佛為說普集三世佛自在法經大威光菩薩得一切法悉入最初菩提心中其佛受命五十億歲彼佛滅後有波羅蜜善眼佛於大林中成等正覺大威光菩薩即得念佛三昧名無邊海藏雲其佛為說法界體性清淨經聞已獲得清淨智其佛入滅喜見王尋亦去世大威光菩薩受轉輪王位彼大林中第三佛出名最勝功德海大威光從佛聞說普眼光明行經得大福德三昧彼大林中復有佛出名普聞蓮華眼大威光於此命終生須彌山頂為大天王名離垢福德幢如來為說廣大方便經獲得普門歡喜藏三昧意曰勝音劫中有十須彌山微塵如來出興於世大威光菩薩一一供養聞經得法是因無盡今有十不可說世界種是果無窮二普光明殿會七如來名號品身業周遍經中妙悟皆滿二行永絶歎佛二十一種功德若世尊見愍我等開示因中十問果中三十問世尊知諸菩薩心之所念為現神通十首菩薩來集普光明殿意曰佛法大海信為初首一小乘但信佛一人成道二大乘初教信一分半衆生不成佛三終教自信己性決定成佛四頓教信生佛本無五圓教無成無不成一成一切成經中文殊言諸佛身名不可思議不應住於一法見佛身名如來於此娑婆世界諸四天下有種種名種種身色相壽命處所衆會種種不同於此四天下或名一切義成或名圓滿月或名瞿曇氏或名大沙門於東方善護世界亦有十名餘九世界各有十名則其數十千名能令衆生各別知見意曰佛有無盡名森羅萬像舉世立名俱是佛名於此住處或名燈籠或名卓子或名香罏或名翠竹或名黃華若能如此用心見佛則步步釋迦出世念念彌勒下生便見佛身名周於法界八四聖諦品語業該周經中苦者三界報集者三界因滅者超出三界道者戒定慧因令知苦斷集證滅修道佛之語業隨衆生心各別調伏娑婆世界每諦下有十名餘九世界四諦下各有十名於苦諦下或名可厭或名逼迫或曰不淨意曰一切名因逐業用變名無得物之功物無當名之實但能假名生善便是化佛語業無量若說如來國土身語業則風鈴聲啼鳥聲皆是如來說法聲無義語說不二法頓見本心俱離有無便見佛之語業周於法界九光明覺品意業該周經中世尊從兩足輪下放光明照此三千大千世界有百億閻浮提百億四王天乃至百億色究竟天其中所有悉皆明見十方菩薩圍繞百億文殊同時發聲歎佛光明若見放光照十方十世界則有十百億文殊歎佛光明若見放光過十世界則照十方百世界有千百億文殊歎佛光明若見放光過百世界則照十方千世界有百萬億文殊歎佛光明若放光過百千世界則照百萬若放光明過百萬則照一億若放光明過一億則照十億若放光明過十億則照百億意曰光明是智用用能隨緣大小不定廣狹臨時悉皆明見覺悟自他若穿針時於針孔內悉皆明見若寫字時於筆端上悉皆明見若在一室悉皆明見若登高望百里千里悉皆明見覺悟本心令他知見十菩薩問明品智明生信經中文殊菩薩長行問於九首九首以偈答於文殊意曰因問生明或問中有明智明生信見諸法空知心妄動無前境界修遠離法觸目遇緣自信己性具有佛德無障礙法即得現前一心一種種差別問覺首萬法體虗顯性答二無實衆生佛化問財首離相寂滅歸性答三果報無我誰受問寶首鏡中現像一異答四悟一說多相違問德首一多相成無礙答五田一果多不同問目首心有高下報別答六佛教有無利益問勤首精進懈怠不同答七受法新起煩惱問法首不行非斥多聞答八智正行助贊美問智首萬行皆智隨心答九道一果多不同問賢首同中有異離見答十九首復以佛境問文殊生界法界無別答文殊智明生信深入理觀自信己性決定成佛後起淨行事近旨遠念即無念一念頓圓十一淨行品觸事淨願意曰有圓信者具淨行相蓋善用其心於善不善無記境皆具淨行則八萬四千塵勞皆淨行也世間萬物皆淨行也且如見手時當願衆生具正信手合掌向佛若見足時當願衆生行真正道無有休息若聞鳥聲當願衆生悟自聞性不生不滅若了味時當願衆生嘗正法味長養法身若善用心淨行無間獲於勝妙功德於一切佛法心無所礙住去來今諸佛之道當如普賢色像第一而為衆生第二導師經中一百四十種隨緣行願所為在家孝事父母出家堅持禁戒妻子常樂遠離見施捨於慳心入寺諸師求請剃髮授戒正身修定舉足下足見聞覺知無非廣大行願十二賢首品信心成德意曰若善用心有勝妙功德則事近旨遠信為三賢之首萬行之本正明發起四弘誓願皆通空假中三觀雖見衆生空而化即佛之衆生雖見煩惱即菩提而斷即菩提之煩惱雖見菩提不可求無求中求矣雖見萬法離言而學離言諸法此四開發本有淨心自信己性決定成佛於眼根中入正定於色塵中從定起者是信心五對無礙之境一根境不礙一心二正定事定不礙理定三分別不礙無分別四入定不離出定五定體不礙定用應云根入根起境入境起根入意起境入根起方網三昧從信而入信能必到如來地經中喻云世間福業尚如此何況圓修真實法三忉利天宮會十三升須彌山頂品不起而升經中妙勝殿上敷置普光明師子座已帝釋遙見佛來曲躬合掌善來世尊善來善逝受請入殿忽然廣博量等虗空一切閻浮提皆言佛在中我等今見佛住於須彌頂不起而升也一即一切也十四須彌頂上偈讚品說諸法空經中如來從兩足指放光法慧等十菩薩各說偈讚佛談諸法空見般若體一句一偈超情離見開悟在人十五十住品直心正念真如法經中法慧菩薩入於無量三昧諸佛與智摩頂已從定而起告諸菩薩言有十種住則是信滿住初便成正覺一發心住見佛聞法或見劇苦而自開悟如來十種智力一是處非處智二善惡業報智三諸禪三昧智四諸根勝劣智五種種解智六種種界智七種種道智八宿命智九天眼智十漏盡智勝進心中應學勤供養佛樂住生死心轉增勝二治地住發利益十種心應誦習多聞虗間寂靜三修行住觀一切無常應觀察衆生界世界明了法四生貴住從聖教生應學十法了知三世佛平等法五具足方便住護救衆生應學知衆生無邊無著六正心住聞讚毀三寶心定不動應學無相如幻七不退住三寶有無心不退轉說一即多多即一八童真住三業無失隨業受生知剎動剎供養諸佛九王子住知衆生受生煩惱真諦法王善巧力持無畏十灌頂住震動世界智三世佛法智增長一切智意曰應無所住而生其心則念念契如為住住有無量開發本有菩提心時有三種相以三賢表之今是下賢直心有所聞法即自開悟不由他教爾時佛神力故六種十八相震動雨天妙華極妙音聲意曰震即是聲動乃是色從小至大有六種相所以震兼吼擊動兼起涌六種相者搖揚不安動也自下升高起也忽然騰躍涌也隱隱出聲震也雄聲遏吼也輷碣作聲擊也一切衆生見不超色聽不越聲迷昧本心流轉生死華嚴經三天偈讚句句之中透過色聲即今見聞一句一偈為金剛種能破於十法界聖凡色聲豈止鐵城也諸經震動於此明矣人皆罔測更冀詳之十六梵行品無相修因意曰淨行至此成熟正念天子問菩薩依如來教染衣出家云何而得梵行清淨法慧菩薩答應以十法為緣謂身語意業佛法僧戒如是觀已於身無所取於修無所著於法無所住此世不移動彼世不改更梵行不可得住無相法方便自在應修十種智力一一力中有無量義悉應咨問於諸佛法不生二解一切諸法疾得現前初發心時即得成佛蓋為知一切法即心自性成就慧身不由他悟十七初發心功德品校量顯勝經中天帝釋白法慧言開發菩提心有幾何功德答此義甚深不可以世間樂具及四禪樂四空樂四果樂可比何以故開發本有成佛心時令如來種不斷故充滿一切世界故於一切法悉無餘故十八明法品照了真俗意曰開發心時具有無量功德精進菩薩問法慧言云何修習佛法答應明了十種不放逸法十種佛歡喜法十種速入諸地法十種所行清淨法十無盡藏法四夜摩天宮會十九升夜摩天宮品不動而遍經中於寶勝殿內化作蓮華師子座有百萬億華奩香篋鬘蓋幢幡周遍十方供養於佛二十夜摩天宮偈讚品唯心所現意曰菩提心中第二深心相樂修諸善行十林菩薩說了知一切法自性無所有二十一十行品深心樂修行經中功德林菩薩承佛神力入善思惟三昧十方佛加與智摩頂已從定而起告諸菩薩言行不可思議與法界等有十種一歡喜行內外慧施見來乞者心生歡喜我得善利一饒益行寧捨身命護持禁戒未曾一念心生欲想三無違逆行謙下恭敬以阿僧祇器仗逼害但生慈心四無屈撓行受苦無悔心自慶幸令一切衆生安樂五離癡亂行堅固不動入胎住胎遇魔境界心不動六善現行三業清淨方便出生暫同止住悉不虗棄七無著行佛會聞法心生喜具大方便而無所著八難得行了衆生空不住此岸彼岸中流無休息九善法行為世間作清涼地以無礙辨才斷一切疑十真實行如說能行作不請友親近者悉令開悟二十二十藏品稱性修行意曰蘊集十行成此十藏堅固生長不可破壞其有十種一信藏則契理二慚藏則崇重賢善三愧藏則輕拒暴惡四戒藏則防惡發善五念藏則明記不忘六聞藏則無所不知七施藏則捨而不吝八慧藏則揀擇邪正九持藏則住持不忘十辨藏則說法利他
