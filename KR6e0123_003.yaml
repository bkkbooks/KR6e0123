body:
  text: 河朔平原道通述三十四如來十有相海品深廣無涯經中普賢說如來化身頂上有三十二大人相兼餘身分共有九十七相每相有五事一依處為如來化身頂上有大人相二名字光明雲一化成家也三體性莊嚴不同四業用常放光明五利益生善滅惡意曰餘九身上大人相豈可窮也故經有如海之言乃相大也且菩提身上有大人相名布施雲用無貪三業為體常放大慈光明令諸衆生生善滅惡則八萬四千波羅蜜皆是大人相若如來國土身有大人相名筆雲用羊兔毛為體常放黑摩尼光明令諸衆生書寫善事復有大人相名寶針雲用鋼鐵莊嚴常放利焰光明令諸衆生補破遮寒如此則世間所有皆是如來大人相也三十五隨好光明功德品三重十地經說三重頓圓十地者是轉益用大也佛親說者難信故如來為菩薩時足下有四十種光明於圓滿王好中放光照下地獄有遇斯光者死生忉利天聞天鼓音懺悔已即時位登十地先薰一乘種子也此是正益化作一萬香雲供養菩薩若有衆生身蒙香者亦得滅除一切煩惱登於十地一重轉益也化作一萬蓋雲供養菩薩若有衆生見其蓋者種一清淨金剛轉輪王善根亦登十地是第二重轉益也輪王頂上放大光明若有衆生遇斯光者亦位登十地第三轉益也難處不為難聞薰種子熟即得超十地三十六普賢行品因該果海意曰瞋心障大慈慈用無瞋為體若起一念瞋心則掃盡菩薩行一障一切障所以經云我不見一法為大過失如此菩薩向彼菩薩起一念瞋心則有百萬障門若一念瞋心息則具一切菩薩行一斷一切斷為普賢行三十七如來出現品果徹因源意曰出現本有法一切衆生法身如理出現報身障盡出現化身隨機出現何故不云衆生言如來出現答非唯佛也如體不變隨緣名來來即三身十身出現之法三業化用出現之法衆生省悟即新成舊佛如鎔金成像是不一義新佛舊成是不異義如破模出像使應即真而真即應吾今此身即是常身法身乃至草木皆平等也一出現因緣悲智為因衆生為緣有十喻明法多因多緣如大千興造說法應機如大雲降雨隨機便見如雲雨無從教行不則如大千雨滴生善滅惡如成劫大雨大悲一味如雨資百草先勝後劣如成立世界無有分別如風輪建立無礙慧身如山林依地饒益衆生如水陸空行二身相出現應於一切色非色處見於如來有十喻明法身遍五無量界如空遍色非色處身無分別如太虗空光明照耀如破暗作明普照一切如日出照山無不利益如日出分晝夜四種奇特如靜月輪無有差別如大梵王絶於思慮如醫王延壽作大佛事如摩尼珠見者生喜如如意寶三口現語業若以用從體則不壞屈曲等於法界若以體從用則一一音含於法界若用即是體妙音常寂若體即是用則如長風隨寂如斯妙音非心識境故以喻明聲體無我如劫盡唱聲隨緣現起如山谷聲音無斷絶如天鼓開覺聞者差別如天女音應時不失如梵王聲無有邪曲如一味水普隨心樂如降雨資榮無有變易如漸成熟難以情思如龍王降雨普遍一切如雷電風雨四意業出現如來心意識俱不可得遮詮顯勝也但以智無量故知如來心表詮顯勝也故以喻明十智無依成事如太虗空不增不減如法界性用廣體密如四寶性增益衆生如大海潛流滅惑成德如珠消海水依持無礙如空含受窮劫利樂如大藥王樹知無不盡如劫壞火燒留惑潤生如劫風持壞佛性果智如大經潛塵妄覆真小含大一具多衆生本有果智即佛果智何故作衆生答妄想執著而不證得智眼未開復何怪哉五境界出現正明分齊境兼明所緣境十法界境界具如來境界乃至涅槃真如無境界皆是如來境界所緣之境如降雨無從分齊之境如大海無窮六行出現同如絶相無礙行金翅取龍日月無私七菩提出現云何名成正覺答正揀小乘成揀菩薩問以何法為體答二智二斷為體問有幾種菩提答或二或三萬像皆具十身寂照為體如淨日輪印現萬機如大海水性相甚深離言論平等三輪收萬像因果交徹一成一切成有二一生之本佛與佛之本佛無異故說一成一切成也二生佛是染淨相融同真界故說一成一切成也體離虧盈如太虗空相無增減如化現無形用該動寂即一現多同於法界毛塵包遍普遍諸心衆生有佛果智不斷則生佛非一不離則生佛非異則正不異時常不一若生若佛求不可得八轉法輪出現有五一八正道為輪自性二聞思修為輪因三五蘊為助伴四四諦作境界五菩提涅槃為輪果今經有十一能轉心證法不生二所轉體即三輪寂三得果離斷常四教不可說五本來清淨六觸言皆轉七即用而寂八即一而多九橫豎無礙十深廣無涯能令三界所有聲皆是如來說法音九涅槃出現有三一性入清淨涅槃二真入圓寂涅槃三示入方便涅槃皆以摩訶般若解脫法身三法為體不縱不橫不竝不別如天之目如世之伊有十種相一體性真常與萬法同二德用圓備令應即真三出沒常湛應迹無方四虧盈不遷法身常然五示滅妙存處有不有六隨世生滅長短不定七有無互現隨機起滅八大用無涯分布舍利九體離二邊非實非虗十結歸無住悲智雙運十見聞親近能生衆生三德善根量云後明不信益者如狂病人罵藥藥入口中亦得病去今語遠益如不輕菩薩謗尚遠益況解行在身此經信與不信俱得成佛有何難哉妄情未盡不契本法疑念消除始知從來出現今令外亡言象內絶思求則庶幾於出現之旨今能信者宿因薰種若更不信當來豈聞然此一品文法玄奧能頓能圓究諸佛本罄諸法源根本法輪更處其心玄中玄也八三會普光明殿三十八離世間品悲智無礙行意曰世即虗僞器及有情或云分段變易離有四種一隨是大悲揀於小乘自利二離是大智揀於凡夫染著三菩薩悲無不智世無不離智無不悲離無不世四如來則境上世離兩亡心上則悲智雙絶能全隨而常離事離則不即世間性離則即是世間今事性二利為宗頓成圓行為趣普慧併問二百問普賢併答二千答者表位虗行實也九逝多園林會三十九入法界品流通無盡經意曰法有五謂有為無為俱存俱泯無障礙界為性義因義入亦有五信入有為法界解入無為法界修行入俱存證入俱泯圓入無障礙本會頓入法界末會漸入法界頓中有漸本中有末經云不離逝多林如來座前化現種種身雲遍往一切村營城邑以種種言音說四十二解脫法門諸大聲聞身廁祇園何不見聞廣大佛德不見潤益甚深德如鬼見膿河不見高顯廣大德如夢遊天宮不見幽道難見德如愚對雪山不見祕藏難知德如隱伏藏不見迥絶難測德如盲不見寶不見智照難量德如淨眼明見不見周遍難思德如比丘入定不見光顯超世德如妙藥翳形不見微妙難懷德如二天隨人不見廣大境界德如滅定不行意曰聲聞劣而不見聞菩薩勝而能頓證力用交徹勝劣互收成大緣起方是深玄無差之差則有三乘五性差即無差平等成佛末會有三一文殊從善住樓出一切部類俱隨智轉舍利弗等六千比丘隨逐文殊如象王回觀諸比丘歎文殊德六千道成言下心無疲厭成就佛法得無礙眼入大法海於文殊足下成道二經歷人間至福城東說普照法界經一萬諸龍發菩提心三乘人會權歸實三善財會文殊為說諸法空善財開發本有菩提心寂然常住依此參善知識令普賢行速得圓滿有十種心發足南行順智光明一德雲比丘住勝樂國解行發心踏著妙峯山頂證佛二身行也諸佛隨念而現解也二海雲比丘住海門國淨治心地觀於業海心海法海十二支普眼法離見聞覺知三善住比丘在楞伽道修行住於法性空中往來經行諸天作禮恭敬圍繞四彌伽居士住達里國從聖教生說輪字法妙音無礙明利鈍根說二乘法五解脫長者住聚落中以方便力八相成道現一切剎自心如水諸佛如影一念具足六海幢比丘住閻浮提正心入定離出入息從身出生十四類彼此如夢在法性中現七休捨優婆夷住海潮處不退大心衆寶莊嚴離憂安隱演不可說方便門八毗目瞿沙仙人住那羅國童真三業執善財手見十佛剎放善財手還住自位不動九勝熱婆羅門住伊沙那為法王子逆行如火聚刀山似萬行善財投身下得善住三昧十慈行童女住師子城法水灌頂莊嚴宮殿皆見法界諸佛令我各異門入一善見比丘往三眼國具三種施常生歡喜圓光一尋一念之中悉見諸佛二自在童子在河渚中廣行饒益持三聚戒修學算數悟入神通智慧光明三具足優婆夷在海住城心無違逆身無纓絡唯一小器隨衆生欲飲食充滿八萬眷屬四明智居士住大興城心無屈撓仰視虗空隨意出生無量衆生悉皆如意仰視真精進五寶髻長者住師子城心無癡亂將善財入禪定宅有十層八門燒一元香永離貧窮六普眼長者住藤根國善現正位方便出生合和一切香唯用智波羅蜜普見一切佛七無厭足王住多羅城身行無著見瞋害行逆行方便一切衆生皆如幻化不惱一蚊一蟻八大光王住妙光城以難得行建大慈幢山川草木悉回向曲躬於王願力成就九不動優婆夷在安住國用善法行供養修臂佛不生念欲之心求法無厭十遍行外道住都薩羅行真實行化諸異見示同其形說一切處菩薩行門一鬻香長者住廣大國救護衆生離衆生相別知一切香出處功能有其十種二婆施羅船師不壞善根將諸商人入佛法海行安隱道珍寶充足還閻浮提三無上勝在可樂城等一切佛理斷事務令捨非法順行善法忍辱柔和四師子頻呻比丘尼在迦陵林以大精進至一一處遍坐寶樹衆會不同所說各異五婆須蜜女住險難國無盡功德在市鄽北離貪欲際衆生見我隨樂皆現六瑟胝羅居士在善度城善根堅固開栴檀佛塔見三世諸佛不曾入般涅槃七觀自在菩薩隨順衆生大悲行門常在一切如來所普現一切衆生前八正趣菩薩從法性空中來同如之行有一百種一念不移普至十方供佛聞法九大天神在墮羅城以無著無縛力舒四無礙手取四大海法水自洗其心能淨他心十安住地神住摩竭國用等法界善根足按轉心地諸寶涌出不可破壞自在如意一婆珊婆演底夜神在迦毗城生大歡喜三心齊具見佛說法成熟衆生如大雲網二普德淨光夜神以淨戒力供佛說法普遊步解脫三喜目觀察衆生夜神發光明身現相似身雲於衆生前聞思修慧說一切法四普救衆生夜神如焰慧破四大空息三惡為妙德女修補故壞佛像生在王家五去此不遠有寂靜音海夜神性相互乖於此得勝觀佛毛孔作用無邊修十大法藏六守護一切衆生夜神般若現前得大總持說緣生法為法輪光比丘尼護持佛法七開敷一切樹華夜神遠行大行佛昔因地盡皆明見為寶光明女信知他人功德八大願精進力夜神普現色身為善伏太子救獄罪人遇燈王佛說圓滿經九妙德夜神善慧說法十種受生藏我皆親近十釋女瞿波能受雲雨法曾為妙德女探蘭修微行願見威德主今日已圓滿諦觀無厭足如意得自在一摩耶夫人住此世界中一切衆生前常現大願身三世諸佛以願智為母我身不餘本量等於虗空曾為道場神又為蓮池神及菩提樹神皆號我為母二天王光有淨莊嚴造立伽藍得清淨念三童子師遍友都無言說即得實無所得法四善知衆藝童子唱持四十二字母皆得般若現前意曰從文殊至天王光皆帶義理唱但是聲故為義母表住四十二其實無窮且如唱喝字時入般若門名金剛王劒唱咄字時入般若門名師子踞地五賢勝優婆夷住無依處道場出生一切智光明六堅固長者住無著念清淨於十方佛求於正法七妙月長者住淨光明知佛德用無邊教化有情八無勝軍長者住出生城見佛十身無盡相莊嚴九最勝寂靜婆羅門住城願語一切所作皆得成就十德生有德住妙意華門城得一切如幻因緣所生一慈氏菩薩會緣入實相住大莊嚴樓閣前歎善財發菩提心彈指出聲樓閣門開善財得入三世不忘念二文殊菩薩住普門城智照無二相昔受文殊教歷於一百一十城即伸右手摩善財頂若離信自心則一切善法不得成就信與智無二也三普賢菩薩在如來前於一一毛孔中現無邊光明雲善財見已生大歡喜彼一切微塵中普賢即伸右手摩善財頂言我法海中一文一句未有不是捨轉輪王身位而求得者善財住自位普賢摩頂已證與諸佛等意曰善財冥心得見三千大千微塵數善知識者五根五塵皆善知識略示一二以例諸法一燈燭善知識在如來座前告善財言我得解脫名普照燈於日沒夜暗時作大佛事若人見我生歡喜心若天見我生快樂心龍神見我生敬仰心聲聞見我生寂靜心菩薩見我生慈悲心如諸菩薩其心如地我豈能知二卓子善知識在如來前告善財言我得解脫名普皆平等於三世諸佛一切衆生其心平等無有高下猶如大地不生分別如諸菩薩普覆三界我豈能知三法堂善知識在如來會上告善財言我得解脫名普蔭一切若諸衆生得見我者生廣大想生清涼想生奇特想生聽法想一切凡聖常來此中天龍圍繞聞法歡喜作禮而退
